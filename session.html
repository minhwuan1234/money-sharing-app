<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chuyển tiền — Thu Tiền Nhóm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
  <div class="max-w-md mx-auto px-4 py-6">

    <div id="loading" class="text-center text-slate-400 py-20">Đang tải...</div>

    <div id="content" class="hidden">
      <!-- Tiêu đề -->
      <header class="text-center mb-5">
        <h1 id="eventTitle" class="text-2xl font-bold"></h1>
        <p id="eventDate" class="text-sm text-slate-400"></p>
      </header>

      <!-- Số tiền + thông tin nhận -->
      <section class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5 mb-4 text-center">
        <p class="text-sm text-slate-400">Số tiền mỗi người</p>
        <p id="amount" class="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400 my-1"></p>
        <p id="adjNote" class="text-xs text-slate-400 mb-4"></p>

        <!-- QR -->
        <img id="qr" alt="QR chuyển khoản" class="mx-auto rounded-xl w-56 h-56 object-contain bg-white" />

        <div class="text-left text-sm mt-4 space-y-1.5 bg-slate-50 dark:bg-slate-800 rounded-xl p-3">
          <div class="flex justify-between"><span class="text-slate-400">Ngân hàng</span><span id="bankName" class="font-medium"></span></div>
          <div class="flex justify-between items-center"><span class="text-slate-400">Số TK</span>
            <span><b id="bankAccount"></b> <button id="copyAcc" class="text-indigo-500 text-xs ml-1">copy</button></span></div>
          <div class="flex justify-between"><span class="text-slate-400">Chủ TK</span><span id="collector" class="font-medium"></span></div>
          <div class="flex justify-between items-center"><span class="text-slate-400">Nội dung</span>
            <span><b id="transferContent"></b> <button id="copyContent" class="text-indigo-500 text-xs ml-1">copy</button></span></div>
        </div>
      </section>

      <!-- Tìm tên & tick -->
      <section class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5">
        <h2 class="font-semibold mb-1">Bạn là ai?</h2>
        <p class="text-xs text-slate-400 mb-3">Tìm tên mình rồi bấm "Tôi đã chuyển".</p>
        <input id="search" class="inp mb-3" placeholder="Gõ tên hoặc SĐT để tìm..." />
        <div id="memberList" class="space-y-2 max-h-80 overflow-y-auto"></div>
      </section>
    </div>

    <div id="error" class="hidden text-center py-20">
      <p class="text-5xl mb-3">😕</p>
      <p id="errorMsg" class="text-slate-500"></p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm opacity-0 transition-opacity pointer-events-none z-50"></div>

  <style>
    .inp { width:100%; padding:0.6rem 0.75rem; border-radius:0.6rem; border:1px solid rgb(203 213 225);
           background:white; color:inherit; font-size:0.9rem; outline:none; }
    .inp:focus { border-color:rgb(99 102 241); box-shadow:0 0 0 3px rgb(99 102 241 / 0.15); }
    .dark .inp { background:rgb(15 23 42); border-color:rgb(51 65 85); }
  </style>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/session.js"></script>
</body>
</html>
