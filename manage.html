<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Thu Tiền Nhóm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-6">

    <div id="loading" class="text-center text-slate-400 py-20">Đang tải...</div>

    <div id="content" class="hidden">
      <!-- Header -->
      <header class="flex items-start justify-between mb-5">
        <div>
          <a href="index.html" class="text-sm text-indigo-500">← Trang chủ</a>
          <h1 id="eventTitle" class="text-2xl font-bold mt-1"></h1>
          <p id="eventDate" class="text-sm text-slate-400"></p>
        </div>
        <div class="flex items-center gap-2">
          <span id="liveDot" class="text-xs text-slate-400 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>live</span>
          <button id="btnTheme" class="px-3 py-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-sm">🌙</button>
        </div>
      </header>

      <!-- Tổng quan -->
      <section class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5 mb-4">
        <div class="flex justify-between items-end mb-2">
          <div>
            <p class="text-sm text-slate-400">Đã nhận</p>
            <p id="collected" class="text-3xl font-extrabold text-emerald-600 dark:text-emerald-400"></p>
          </div>
          <div class="text-right">
            <p class="text-sm text-slate-400">Tổng cần thu</p>
            <p id="total" class="text-xl font-bold"></p>
          </div>
        </div>
        <!-- Progress bar -->
        <div class="w-full h-3 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
          <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-500" style="width:0%"></div>
        </div>
        <div class="flex justify-between text-xs text-slate-400 mt-2">
          <span id="progressText"></span>
          <span id="remainText"></span>
        </div>
      </section>

      <!-- Nút nhắc nợ -->
      <button id="btnRemind" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold mb-4 disabled:opacity-50">
        📋 Copy text nhắc nợ
      </button>

      <!-- Danh sách thành viên -->
      <section class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5">
        <h2 class="font-semibold mb-3">Danh sách thành viên</h2>
        <div id="memberList" class="space-y-2"></div>
      </section>
    </div>

    <div id="error" class="hidden text-center py-20">
      <p class="text-5xl mb-3">😕</p>
      <p id="errorMsg" class="text-slate-500"></p>
    </div>
  </div>

  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm opacity-0 transition-opacity pointer-events-none z-50"></div>

  <style>
    .inp { width:100%; padding:0.6rem 0.75rem; border-radius:0.6rem; border:1px solid rgb(203 213 225);
           background:white; color:inherit; font-size:0.9rem; outline:none; }
    .dark .inp { background:rgb(15 23 42); border-color:rgb(51 65 85); }
  </style>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/manage.js"></script>
</body>
</html>
